# NATS Server Configuration for CC Project
# Version: v2.12.7
# Environment: Development

# Server identity
server_name: "cc-nats-dev"
server_tags: ["cc", "dev", "mqtt"]

# Core NATS port
port: 4222

# HTTP monitoring port
http_port: 8222

# JetStream configuration
jetstream {
  enabled: true
  store_dir: "/tmp/nats/jetstream"
  max_memory_store: 1073741824  # 1GB
  max_file_store: 5368709120    # 5GB
}

# MQTT support for IoT devices
mqtt {
  port: 1883
  # QoS 0 and 1 are supported
  # QoS 2 is not supported in this version
  # Keep alive: 60 seconds
  # Max message size: 1MB
}

# Cluster configuration (optional for development)
# cluster {
#   port: 6222
#   routes: []
# }

# Authentication (disabled for development)
# authorization: {
#   users: [
#     {user: "admin", password: "password"}
#   ]
# }

# Logging
debug: false
trace: false
logtime: true

# Limits
max_connections: 1000
max_payload: 1048576  # 1MB
max_pending: 65536
write_deadline: "2s"

# TLS (disabled for development)
# tls {
#   cert_file: "./certs/server-cert.pem"
#   key_file: "./certs/server-key.pem"
# }
